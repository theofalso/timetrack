<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Time Tracker Dashboard</title>
    <style>
        body { 
            font-family: monospace; 
            margin: 20px; 
            background-color: #ffffff; 
            color: #000000; 
        }
        h1 { 
            font-size: 1.5em; 
            margin-bottom: 20px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        th, td { 
            border: 1px solid #000000; 
            padding: 8px; 
            text-align: left; 
        }
        th { 
            background-color: #f0f0f0; 
        }
        .active { 
            color: #ff0000; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <h1>TIMETRACK DASHBOARD</h1>

    <table>
        <thead>
            <tr>
                <th>PROJECT</th>
                <th>START TIME</th>
                <th>END TIME</th>
                <th>DURATION</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td><strong>{{.Project}}</strong></td>
                <td>{{.StartTime.Format "2006-01-02 15:04:05"}}</td>
                <td>
                    {{if .IsActive}}
                        <span class="active">[IN PROGRESS]</span>
                    {{else}}
                        {{.EndTime.Format "2006-01-02 15:04:05"}}
                    {{end}}
                </td>
                <td>{{.Duration.Round 1000000000}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>

</body>
</html>
